{% extends "base.html" %}
{% block title %}Smart Lender | Page Not Found{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/result.css') }}">
{% endblock %}
{% block content %}
<div class="result-page rejected-page">
    <section class="result-hero">
        <div class="container-fluid px-3 px-lg-4 py-4 py-lg-5">
            <div class="result-banner rejected">
                <div class="banner-copy">
                    <span class="banner-chip"><i class="fa-solid fa-circle-question me-2"></i>404</span>
                    <h1><i class="fa-solid fa-map-signs me-2"></i>Page not found</h1>
                    <p class="banner-subtitle">The page you requested does not exist or has been moved.</p>
                </div>
                <div class="banner-meta">
                    <div class="meta-pill"><span>Status</span><strong>Not Found</strong></div>
                    <div class="meta-pill"><span>Action</span><strong>Check the links</strong></div>
                </div>
            </div>

            <div class="result-actions">
                <a class="btn btn-primary action-btn" href="{{ url_for('index') }}"><i class="fa-solid fa-house me-2"></i>Home</a>
                <a class="btn btn-outline-light action-btn" href="{{ url_for('predict_form') }}"><i class="fa-solid fa-wand-magic-sparkles me-2"></i>Predict Loan</a>
            </div>
        </div>
    </section>
</div>
{% endblock %}
