{% extends "base.html" %}
{% block title %}Smart Lender | Page Not Found{% endblock %}
{% block content %}
<section class="error-section py-5">
	<div class="container py-5">
		<div class="row justify-content-center">
			<div class="col-lg-7 col-xl-6">
				<div class="error-card card border-0 shadow-lg text-center">
					<div class="card-body p-4 p-md-5">
						<div class="error-badge mb-3">404</div>
						<h1 class="h2 fw-bold mb-3">Page not found</h1>
						<p class="text-muted mb-0">The page you requested does not exist or has been moved.</p>
						<div class="d-flex flex-column flex-sm-row gap-3 justify-content-center mt-5">
							<a href="{{ url_for('index') }}" class="btn btn-primary btn-lg px-4">Home</a>
							<a href="{{ url_for('predict_form') }}" class="btn btn-outline-primary btn-lg px-4">Predict</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
{% endblock %}
